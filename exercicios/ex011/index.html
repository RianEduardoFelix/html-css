<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>Tente abrir este site em diferentes dispositivos ou simplesmente aumente e diminua o tamanho do seu navegador.</p>

    <picture>
        <source media="(max-width: 750px)" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png">
        <img src="imagens/foto-g.png" alt="Imagem flexível">
    </picture>

    <h1>Reproduzindo áudio</h1>
    <audio preload="metadata" autoplay controls loop>
        <source src="midia/Resolution-Or-Reflection-The Grey Room _ Clark Sims.mp3" type="audio/mpeg">
        <source src="midia/Resolution-Or-Reflection-The Grey Room _ Clark Sims.ogg" type="audio/ogg">
        <source src="midia/Resolution-Or-Reflection-The GreyRoom _ Clark Sims.wav">
<p>Infelizmente seu navegador não consegue reproduzir áudio <a href="midia/Resolution-Or-Reflection-The Grey Room _ Clark Sims.mp3">Clique aqui para baixar o arquivo MP3</a></p>
    </audio>
    <!-- MP3 WAV OGG-->
</body>
</html>
